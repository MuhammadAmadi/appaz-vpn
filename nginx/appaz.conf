# ========================================================================
# appaz — внутренний http-блок nginx
# слушает 127.0.0.1:8443 (TLS-терминатор) и 0.0.0.0:80 (редирект)
# ========================================================================

# Порт 80: всё редиректим на HTTPS (для реалистичности — настоящие сайты так делают)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location / {
        return 301 https://$host$request_uri;
    }
}

# Внутренний TLS-эндпоинт на 127.0.0.1:8443
# Сюда попадает трафик из двух источников:
#   1. nginx stream роутер с 0.0.0.0:443 (когда SNI = наш домен)
#   2. Xray Reality fallback (self-steal dest для чужаков и пробинга)
server {
    listen 127.0.0.1:8443 ssl http2;
    listen [::1]:8443 ssl http2;

    server_name www.appaz.xyz api-vd-1.appaz.xyz appaz.xyz _;

    ssl_certificate     /etc/ssl/appaz/fullchain.pem;
    ssl_certificate_key /etc/ssl/appaz/privkey.pem;

    # Reality требует TLS 1.3 с X25519 и h2 ALPN — отдаём именно это
    ssl_protocols TLSv1.3;
    ssl_ecdh_curve X25519:prime256v1;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    keepalive_timeout 75s;

    root /var/www/appaz;
    index index.html;

    # Реалистичные заголовки безопасности (как у настоящих SaaS)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Фейковая авторизация — отвечает на кнопку "Войти" из лендинга
    # Любой POST с валидным JSON отдаём как "неверный email/пароль"
    location = /api/auth/login {
        default_type application/json;

        if ($request_method != POST) {
            return 405 '{"error":"method_not_allowed","message":"Use POST"}';
        }

        return 401 '{"error":"invalid_credentials","message":"Invalid email or password"}';
    }

    # Сам сайт-заглушка
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Картинки/шрифты — без логов, с кэшем
    location ~* \.(ico|svg|png|jpg|jpeg|gif|webp|woff2?)$ {
        try_files $uri =404;
        access_log off;
        expires 7d;
    }
}
