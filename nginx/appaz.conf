# ========================================================================
# appaz — финальный фронт: HTTPS 443 + заглушка + 2 WS-канала + CF-прокси
# ========================================================================

# HTTP → HTTPS редирект
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# Основной TLS-сервер на 443
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;

    server_name www.appaz.xyz api-vd-1.appaz.xyz appaz.xyz _;

    # Сертификаты (wildcard от Let's Encrypt через CF DNS-01)
    ssl_certificate     /etc/ssl/private/cert.crt;
    ssl_certificate_key /etc/ssl/private/private.key;

    # TLS-настройки: поддержка 1.2 (для старых клиентов) + 1.3 (приоритет)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_ecdh_curve X25519:prime256v1;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    keepalive_timeout 75s;

    # Корень с заглушкой
    root /var/www/appaz;
    index index.html;

    # Заголовки безопасности
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Защита от мусорных тел запросов
    client_max_body_size 1m;

    # ========================================================================
    # Глобальный лимит: макс 100 одновременных TCP-соединений с одного IP
    # ========================================================================
    limit_conn appaz_conn 100;

    # Скрытые файлы (.env, .git) — 404 + не логировать
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ========================================================================
    # /api/apply/access — прокси на Cloudflare Worker (форма заявок)
    # ========================================================================
    location /api/apply/access {
        # Rate limit: 10 req/min, burst 3
        limit_req zone=appaz_auth burst=3 nodelay;
        limit_req_status 429;

        # Только POST/OPTIONS
        limit_except POST OPTIONS {
            deny all;
        }

        proxy_pass https://api.appaz.xyz/access;
        proxy_method $request_method;
        proxy_http_version 1.1;

        proxy_ssl_server_name on;
        proxy_ssl_name api.appaz.xyz;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;

        proxy_set_header Host api.appaz.xyz;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Content-Type $content_type;
        proxy_set_header Content-Length $content_length;

        proxy_pass_request_body on;
        proxy_pass_request_headers on;

        proxy_connect_timeout 10s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
    }

    # ========================================================================
    # /api/auth/login — фейковая ловушка с rate-limit
    # ========================================================================
    location = /api/auth/login {
        # Rate limit: 10 req/min с IP, burst 5
        limit_req zone=appaz_auth burst=5 nodelay;
        limit_req_status 429;

        default_type application/json;

        if ($request_method != POST) {
            return 405 '{"error":"method_not_allowed","message":"Use POST"}';
        }
        return 401 '{"error":"invalid_credentials","message":"Invalid email or password"}';
    }

    # ========================================================================
    # КАНАЛ 1: VLESS+WS на 127.0.0.1:10000 — БЕЗ rate-limit (это VPN)
    # ========================================================================
    location = /api/render/stream {
        proxy_pass http://127.0.0.1:10000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_read_timeout 36000s;
        proxy_send_timeout 36000s;
        proxy_buffering off;
    }

    # ========================================================================
    # КАНАЛ 2: VLESS+WS на 127.0.0.1:10005 — БЕЗ rate-limit
    # ========================================================================
    location = /ws-vpn-2 {
        proxy_pass http://127.0.0.1:10005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_read_timeout 36000s;
        proxy_send_timeout 36000s;
        proxy_buffering off;
    }

    # ========================================================================
    # КАНАЛ 3: VLESS+gRPC на 127.0.0.1:2053 — БЕЗ rate-limit
    # ========================================================================
    location ^~ /chri-grpc {
        client_max_body_size 0;
        grpc_set_header X-Real-IP $remote_addr;
        grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        grpc_set_header Host $host;
        
        # Направляем трафик на локальный Xray порт 2053
        grpc_pass grpc://127.0.0.1:2053;
        
        grpc_read_timeout 36000s;
        grpc_send_timeout 36000s;
    }


    # ========================================================================
    # Статика (картинки/шрифты) — без логов и без лимитов, с кэшем
    # ========================================================================
    location ~* \.(ico|svg|png|jpg|jpeg|gif|webp|woff2?)$ {
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    # ========================================================================
    # Заглушка appaz (корень) — rate-limit 30 req/s с burst 50
    # ========================================================================
    location / {
        limit_req zone=appaz_general burst=50 nodelay;
        limit_req_status 429;

        try_files $uri $uri/ /index.html;
    }
}
