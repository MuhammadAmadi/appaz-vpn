user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
	worker_connections 768;
	# multi_accept on;
}

http {

    # === Rate limiting (от ботов и брута) ===
    # Зона для общих запросов: 30 req/s на IP, буфер 20
    limit_req_zone $binary_remote_addr zone=appaz_general:10m rate=30r/s;
    # Зона для авторизации: 10 req/min на IP (брутфорс)
    limit_req_zone $binary_remote_addr zone=appaz_auth:10m rate=10r/m;
    # Максимум 20 одновременных соединений с одного IP
    limit_conn_zone $binary_remote_addr zone=appaz_conn:10m;
    # Скрыть версию nginx в заголовках/ошибках
    server_tokens off;
    # Лимит на размер тела запроса (защита от загрузки мусора)
    client_max_body_size 1m;


	##
	# Basic Settings
	##

	sendfile on;
	tcp_nopush on;
	types_hash_max_size 2048;
	# server_tokens off;

	# server_names_hash_bucket_size 64;
	# server_name_in_redirect off;

	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	##
	# SSL Settings
	##

	ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
	ssl_prefer_server_ciphers on;

	##
	# Logging Settings
	##

	access_log /var/log/nginx/access.log;
	error_log /var/log/nginx/error.log;

	##
	# Gzip Settings
	##

	gzip on;

	# gzip_vary on;
	# gzip_proxied any;
	# gzip_comp_level 6;
	# gzip_buffers 16 8k;
	# gzip_http_version 1.1;
	# gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

	##
	# Virtual Host Configs
	##

	include /etc/nginx/conf.d/*.conf;
	include /etc/nginx/sites-enabled/*;
}


